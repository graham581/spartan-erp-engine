<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spartan ERP — Sales Order</title>
    <style>
      :root { font-family: system-ui, sans-serif; }
      body { margin: 0; background: #f4f6f8; color: #1f2933; }
      header { background: #1f2933; color: #fff; padding: 14px 20px; font-weight: 600; }
      main { max-width: 760px; margin: 24px auto; padding: 0 16px; }
      .card { background: #fff; border: 1px solid #e4e7eb; border-radius: 8px; padding: 18px; margin-bottom: 18px; }
      label { display: block; font-size: 13px; font-weight: 600; margin: 10px 0 4px; }
      input, select { width: 100%; padding: 8px; border: 1px solid #cbd2d9; border-radius: 6px; box-sizing: border-box; }
      .row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 8px; align-items: end; margin-bottom: 8px; }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      button { padding: 9px 14px; border: 0; border-radius: 6px; background: #3e7bfa; color: #fff; font-weight: 600; cursor: pointer; }
      button.secondary { background: #52606d; }
      button.danger { background: #cf1124; }
      button.link { background: transparent; color: #3e7bfa; padding: 4px; }
      .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
      pre { background: #1f2933; color: #cbd2d9; padding: 12px; border-radius: 6px; overflow: auto; font-size: 12px; }
      .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; background: #e4e7eb; }
      .err { color: #cf1124; font-weight: 600; }
    </style>
  </head>
  <body>
    <header>Spartan ERP Engine — Sales Order</header>
    <main>
      <div class="card">
        <div class="grid2">
          <div><label>Customer</label><input id="customer" value="CUST-1" /></div>
          <div><label>Company</label><input id="company" value="Spartan VIC" /></div>
          <div><label>Transaction date</label><input id="transaction_date" type="date" /></div>
          <div><label>Delivery date</label><input id="delivery_date" type="date" /></div>
        </div>

        <label>Items (windows)</label>
        <div id="items"></div>
        <button class="link" id="addItem">+ add line</button>

        <div class="actions">
          <button id="create">Create Sales Order</button>
        </div>
      </div>

      <div class="card" id="result" hidden>
        <div>
          <strong id="soName"></strong>
          &nbsp;<span class="badge" id="soStatus"></span>
          &nbsp;<span class="badge" id="soDocstatus"></span>
        </div>
        <div class="actions">
          <button class="secondary" id="submit">Submit</button>
          <button class="danger" id="cancel">Cancel</button>
          <button class="link" id="reload">Reload</button>
        </div>
        <pre id="json"></pre>
      </div>

      <div id="error" class="err"></div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const itemsEl = $('items');
      let currentName = null;

      $('transaction_date').valueAsDate = new Date();

      function addItem(code = '', qty = 1, rate = 0) {
        const div = document.createElement('div');
        div.className = 'row';
        div.innerHTML = `
          <div><input class="ic" placeholder="item_code" value="${code}" /></div>
          <div><input class="iq" type="number" min="0" step="0.01" value="${qty}" /></div>
          <div><input class="ir" type="number" min="0" step="0.01" value="${rate}" /></div>
          <button class="link rm">remove</button>`;
        div.querySelector('.rm').onclick = () => div.remove();
        itemsEl.appendChild(div);
      }
      addItem('WIN-AWN', 2, 500);
      addItem('WIN-SLD', 1, 300);
      $('addItem').onclick = () => addItem();

      function gatherItems() {
        return [...itemsEl.querySelectorAll('.row')].map((r) => ({
          item_code: r.querySelector('.ic').value.trim(),
          qty: Number(r.querySelector('.iq').value),
          rate: Number(r.querySelector('.ir').value),
        }));
      }

      function showError(msg) { $('error').textContent = msg ? 'Error: ' + msg : ''; }

      function render(doc) {
        currentName = doc.name;
        $('result').hidden = false;
        $('soName').textContent = doc.name;
        $('soStatus').textContent = doc.status ?? '—';
        const ds = { 0: 'Draft (0)', 1: 'Submitted (1)', 2: 'Cancelled (2)' };
        $('soDocstatus').textContent = ds[doc.docstatus] ?? doc.docstatus;
        $('json').textContent = JSON.stringify(doc, null, 2);
      }

      async function call(url, method, body) {
        showError('');
        const res = await fetch(url, {
          method,
          headers: { 'content-type': 'application/json' },
          body: body ? JSON.stringify(body) : undefined,
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || res.statusText);
        return data.doc;
      }

      $('create').onclick = async () => {
        try {
          const doc = await call('/api/sales-order', 'POST', {
            customer: $('customer').value.trim(),
            company: $('company').value.trim(),
            transaction_date: $('transaction_date').value || undefined,
            delivery_date: $('delivery_date').value || undefined,
            items: gatherItems(),
          });
          render(doc);
        } catch (e) { showError(e.message); }
      };

      const act = (action) => async () => {
        try { render(await call('/api/sales-order/' + encodeURIComponent(currentName), 'POST', { action })); }
        catch (e) { showError(e.message); }
      };
      $('submit').onclick = act('submit');
      $('cancel').onclick = act('cancel');
      $('reload').onclick = async () => {
        try { render(await call('/api/sales-order/' + encodeURIComponent(currentName), 'GET')); }
        catch (e) { showError(e.message); }
      };
    </script>
  </body>
</html>
